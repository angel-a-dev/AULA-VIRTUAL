<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Aula Virtual</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Aula Virtual</h2>
                <p style="font-size: 12px; color: #aaa; margin-top: 5px;">UNICA</p>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">⬅️ Volver al Inicio</a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-title">
                    <h3>Mi Perfil</h3>
                </div>
                <div class="header-user-info">
                    <button id="btnCerrarSesion" class="btn-logout">Salir</button>
                </div>
            </header>

            <main class="content-area">
                <div class="profile-wrapper">
                    <div class="profile-sidebar">
                        <img src="" alt="Avatar" id="perfilFoto" class="profile-avatar-large">
                        <h2 id="perfilNombreCorto">Cargando...</h2>
                        <p id="perfilRolBadge" class="badge">Rol</p>
                    </div>

                    <div class="profile-content">
                        <h3>Información Personal</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <label>Nombre Completo</label>
                                <p id="perfilNombreCompleto">---</p>
                            </div>
                            <div class="info-item">
                                <label>Correo Electrónico</label>
                                <p id="perfilCorreo">---</p>
                            </div>
                            <div class="info-item" id="cajaCodigo" style="display: none;">
                                <label>Código Universitario</label>
                                <p id="perfilCodigo">---</p>
                            </div>
                            <div class="info-item" id="cajaCarrera" style="display: none;">
                                <label>Programa de Estudios</label>
                                <p id="perfilCarrera">---</p>
                            </div>
                        </div>

                        <h3>Seguridad</h3>
                        <form id="formCambiarPassword">
                            <div class="form-group">
                                <label>Nueva Contraseña</label>
                                <input type="password" id="nuevaPassword" class="form-control" required
                                    placeholder="Ingresa tu nueva contraseña">
                            </div>
                            <button type="submit" class="btn-primary" style="width: auto;">Actualizar
                                Contraseña</button>
                            <p id="msgPassword" style="font-size: 13px; margin-top: 10px; display: none;"></p>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/session.js"></script>
    <script src="js/perfil.js"></script>
</body>

</html>
