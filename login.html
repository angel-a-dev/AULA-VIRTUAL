<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Aula Virtual</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Aula Virtual</h1>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" class="form-control" placeholder="ejemplo@universidad.edu.pe"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <div style="margin-top: 8px; display: flex; align-items: center; gap: 5px;">
                        <input type="checkbox" id="mostrarPassword">
                        <label for="mostrarPassword" style="margin: 0; font-weight: normal; font-size: 13px;">Mostrar
                            contraseña</label>
                    </div>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="recordar">
                    <label for="recordar" style="margin: 0; font-weight: normal; font-size: 13px;">Mantener sesión
                        iniciada</label>
                </div>

                <p id="mensajeError" class="error-msg">Correo o contraseña incorrectos.</p>

                <button type="submit" class="btn-primary">Ingresar</button>
            </form>

            <div class="auth-footer">
                <p><a href="#" onclick="alert('Funcionalidad de recuperación simulada. Contacte a soporte.')">¿Olvidaste
                        tu contraseña?</a></p>
                <p style="margin-top: 10px;">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/session.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
