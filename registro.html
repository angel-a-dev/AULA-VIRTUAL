<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Aula Virtual</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Aula Virtual</h1>
                <p>Crea tu cuenta de estudiante</p>
            </div>

            <form id="registroForm">
                <div class="form-group">
                    <label for="regNombre">Nombre Completo</label>
                    <input type="text" id="regNombre" class="form-control" placeholder="Ej: Ana María Rojas" required>
                </div>

                <div class="form-group">
                    <label for="regCodigo">Código Universitario (Opcional)</label>
                    <input type="text" id="regCodigo" class="form-control" placeholder="Ej: 20240015">
                </div>

                <div class="form-group">
                    <label for="regCorreo">Correo Electrónico</label>
                    <input type="email" id="regCorreo" class="form-control" placeholder="ejemplo@alumno.edu.pe"
                        required>
                </div>

                <div class="form-group">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" class="form-control"
                        placeholder="Crea una contraseña segura" required>
                </div>

                <div class="form-group">
                    <label for="regConfirmarPassword">Confirmar Contraseña</label>
                    <input type="password" id="regConfirmarPassword" class="form-control"
                        placeholder="Repite tu contraseña" required>
                </div>

                <p id="mensajeErrorReg" class="error-msg">Las contraseñas no coinciden.</p>
                <p id="mensajeExitoReg" class="error-msg" style="color: var(--verde-exito);">¡Registro exitoso!
                    Redirigiendo...</p>

                <button type="submit" class="btn-primary">Registrarse</button>
            </form>

            <div class="auth-footer">
                <p style="margin-top: 15px;">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <script src="data/datosIniciales.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    </body>

</html>
